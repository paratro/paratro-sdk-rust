name: Release

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"

permissions:
  contents: write

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        run: |
          cargo build --release
          cargo test

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to crates.io
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create release branch
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release/${{ steps.version.outputs.tag }}
          git push origin release/${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## Paratro Rust SDK ${{ steps.version.outputs.tag }}

            ### Installation

            ```toml
            [dependencies]
            paratro-sdk = "${{ steps.version.outputs.version }}"
            ```

            ### Links

            - [crates.io](https://crates.io/crates/paratro-sdk/${{ steps.version.outputs.version }})
            - [Release branch](https://github.com/paratro/paratro-sdk-rust/tree/release/${{ steps.version.outputs.tag }})
            - [Documentation](https://docs.paratro.com)

            ### Changes

            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
